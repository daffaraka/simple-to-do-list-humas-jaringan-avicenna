version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: timepro_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-supersecretpassword}
      MYSQL_DATABASE: ${DB_NAME:-timepro_db}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: timepro_backend
    environment:
      DATABASE_URL: mysql://root:${DB_PASSWORD:-supersecretpassword}@db:3306/${DB_NAME:-timepro_db}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey12345}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: timepro_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
